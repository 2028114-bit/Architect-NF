<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter AI Image Generator</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #output { margin-top: 20px; text-align: center; min-height: 200px; border: 2px dashed #eee; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .status { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>AI Image Generator</h2>
    <div id="lib-status" class="status">Checking Puter.js connection...</div>

    <div class="input-group">
        <input type="text" id="prompt" placeholder="Describe your image..." value="A futuristic cat wearing sunglasses">
        <select id="model">
            <option value="gpt-image-2">GPT Image 2</option>
            <option value="dall-e-3">DALL-E 3</option>
            <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash</option>
            <option value="flux-1-schnell">Flux.1 Schnell</option>
        </select>
        <button id="generate-btn">Generate</button>
    </div>

    <div id="output">
        <p id="placeholder-text">Your image will appear here</p>
    </div>
</div>

<script>
    const btn = document.getElementById('generate-btn');
    const statusDiv = document.getElementById('lib-status');
    const output = document.getElementById('output');

    // Function to check if Puter is ready
    function checkPuter() {
        if (typeof puter !== 'undefined') {
            statusDiv.innerHTML = "✅ Puter.js Loaded Successfully";
            statusDiv.style.color = "green";
            btn.disabled = false;
        } else {
            statusDiv.innerHTML = "❌ Puter.js not found. Retrying...";
            statusDiv.style.color = "red";
            btn.disabled = true;
            setTimeout(checkPuter, 1000); // Check again in 1 second
        }
    }

    // Run check on load
    window.onload = checkPuter;

    btn.onclick = async () => {
        const prompt = document.getElementById('prompt').value;
        const modelName = document.getElementById('model').value;

        if (!prompt) return alert("Please enter a prompt");

        // UI Feedback
        btn.disabled = true;
        btn.innerText = "Generating...";
        output.innerHTML = "<i>Magic is happening... please wait.</i>";

        try {
            // THE CORE CALL
            const img = await puter.ai.txt2img(prompt, { model: modelName });
            
            output.innerHTML = ""; // Clear loader
            output.appendChild(img);
        } catch (err) {
            output.innerHTML = `<p class="error">Error: ${err.message}</p>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate";
        }
    };
</script>

</body>
</html>
