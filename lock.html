<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast AI | Local File Mode</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #238636; --text: #e6edf3; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: var(--panel); padding: 25px; border-radius: 8px; border: 1px solid #30363d; text-align: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; }
        .ai { align-self: flex-start; background: var(--accent); }
        #input-bar { padding: 20px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <h3>Enter Hugging Face Token</h3>
        <input type="password" id="t-input" placeholder="hf_...">
        <button onclick="saveT()">Save</button>
    </div>
</div>

<div id="chat"></div>
<div id="input-bar">
    <input type="text" id="p" placeholder="Type here...">
    <button onclick="send()">Send</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const p = document.getElementById('p');
    const modal = document.getElementById('modal');

    // 1. Storage Logic
    window.saveT = () => {
        localStorage.setItem('hf_key', document.getElementById('t-input').value);
        modal.style.display = 'none';
    };

    if (!localStorage.getItem('hf_key')) modal.style.display = 'flex';

    function add(role, txt) {
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.innerText = txt;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    // 2. The Fetch Logic
    async function send() {
        const key = localStorage.getItem('hf_key');
        const val = p.value.trim();
        if (!val) return;

        add('user', val);
        p.value = '';
        const ai = add('ai', '...');

        try {
            // We use a different proxy that is more "Local File" friendly
            // And we use Mistral-7B - it's often faster to wake up than Llama
            const url = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2";
            
            const res = await fetch(url, {
                headers: { 
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json" 
                },
                method: "POST",
                body: JSON.stringify({ inputs: val }),
            });

            const data = await res.json();
            
            if (data.error) {
                ai.innerText = data.error.includes("loading") ? "Waking up... try again." : data.error;
            } else {
                // Mistral returns the whole prompt + answer, so we clean it
                const fullText = data[0].generated_text;
                ai.innerText = fullText.replace(val, "").trim();
            }
        } catch (e) {
            ai.innerText = "CORS Error. Browsers block local files. Please use 'Live Server' in VS Code or host on GitHub Pages (Free).";
            console.error(e);
        }
    }

    p.onkeydown = (e) => e.key === 'Enter' && send();
</script>
</body>
</html>
