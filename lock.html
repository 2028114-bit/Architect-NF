<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Backend AI Chat</title>
    <style>
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #238636; --text: #e6edf3; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Token Popup Styles */
        #token-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; display: none; }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #30363d; }
        
        /* Chat UI Styles */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; }
        .ai { align-self: flex-start; background: #238636; color: white; }
        
        #input-area { padding: 20px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .settings-btn { position: absolute; top: 10px; right: 10px; background: transparent; border: 1px solid #30363d; font-size: 12px; padding: 5px 10px; opacity: 0.6; color: white; z-index: 10; }
    </style>
</head>
<body>

<button class="settings-btn" onclick="showModal()">⚙️ Update Token</button>

<div id="token-modal">
    <div class="modal-content">
        <h3>Enter Hugging Face Token</h3>
        <p style="font-size: 13px; color: #8b949e;">Get one at huggingface.co/settings/tokens</p>
        <input type="password" id="token-input" placeholder="hf_xxxxxxxxxxxxxxxxx" style="width: 90%; margin-bottom: 20px; padding: 10px; border-radius: 5px;">
        <br>
        <button onclick="saveToken()">Save & Close</button>
    </div>
</div>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="user-prompt" placeholder="Ask something...">
    <button onclick="handleSend()">Send</button>
</div>

<script>
    // Define UI functions globally so the buttons can see them immediately
    const modal = document.getElementById('token-modal');
    const tokenInput = document.getElementById('token-input');
    const chatContainer = document.getElementById('chat-container');
    const userPrompt = document.getElementById('user-prompt');

    window.showModal = function() {
        modal.style.display = 'flex';
    }

    window.saveToken = function() {
        const val = tokenInput.value.trim();
        if (val) {
            localStorage.setItem('hf_api_token', val);
            modal.style.display = 'none';
        }
    }

    // Check for token on startup
    window.onload = () => {
        if (!localStorage.getItem('hf_api_token')) {
            showModal();
        }
    };

    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }

    // The core AI logic
    window.handleSend = async function() {
        const token = localStorage.getItem('hf_api_token');
        if (!token) return showModal();

        const text = userPrompt.value.trim();
        if (!text) return;

        appendMsg('user', text);
        userPrompt.value = '';
        const aiMsg = appendMsg('ai', '...');

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\n${text}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`,
                    parameters: { max_new_tokens: 500 }
                })
            });

            const data = await response.json();
            
            // Handle common HF response patterns
            let reply = "";
            if (Array.isArray(data)) {
                reply = data[0].generated_text;
            } else if (data.generated_text) {
                reply = data.generated_text;
            } else if (data.error) {
                reply = "API Error: " + data.error;
            }

            // Clean up the prompt from the response if Llama repeats it
            aiMsg.innerText = reply.split('<|start_header_id|>assistant<|end_header_id|>').pop().trim();
            
        } catch (err) {
            aiMsg.innerText = "Error: " + err.message;
        }
    }

    // Allow Enter key to send
    userPrompt.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>

</body>
</html>
