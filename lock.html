<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Image Generator (1B)</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #1a1a1a; color: white; margin: 0; }
        #container { text-align: center; background: #2a2a2a; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 90%; max-width: 500px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; box-sizing: border-radius; box-sizing: border-box;}
        button { padding: 10px 20px; border-radius: 6px; border: none; background-color: #007bff; color: white; cursor: pointer; font-size: 16px; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #output-canvas { margin-top: 20px; border: 2px solid #444; max-width: 100%; background: #000; display: none;}
        #status { margin-top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div id="container">
    <h2>On-Device Image Generator</h2>
    <input type="text" id="prompt" placeholder="A stylized cat, pastel colors" value="A beautiful sunset over a cyberpunk city">
    <button id="generate-btn">Generate</button>
    <p id="status">Ready.</p>
    <canvas id="output-canvas"></canvas>
</div>

<script type="module">
    // 1. Import Transformers.js via CDN
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';

    const promptInput = document.getElementById('prompt');
    const generateBtn = document.getElementById('generate-btn');
    const canvas = document.getElementById('output-canvas');
    const status = document.getElementById('status');
    
    // Global variable for the generator
    let generator;

    // 2. Initialize the pipeline
    async function loadModel() {
        status.textContent = 'Downloading model (~1GB). Please wait...';
        generateBtn.disabled = true;

        try {
            // We use a small, quantized Stable Diffusion pipeline.
            // Hugging Face will automatically download this once.
            generator = await pipeline('text-to-image', 'Xenova/tiny-stable-diffusion-v1-5', {
                device: 'webgpu', // FORCE WebGPU
            });
            
            status.textContent = 'Model loaded. Ready to generate.';
            generateBtn.disabled = false;
        } catch (error) {
            status.textContent = `Error loading model: ${error.message}`;
            console.error(error);
        }
    }

    // 3. Generate the image
    async function generateImage() {
        if (!generator) return;
        const text = promptInput.value;
        status.textContent = `Generating "${text}"... This can take 30-60 seconds...`;
        generateBtn.disabled = true;
        canvas.style.display = 'none';

        try {
            // Inference parameters
            const output = await generator(text, {
                negative_prompt: 'ugly, blurry, poor quality',
                num_inference_steps: 20, // Lower steps = faster, worse quality
                guidance_scale: 7.5,
            });

            // 4. Draw the image data to the canvas
            const imageData = output[0];
            canvas.width = imageData.width;
            canvas.height = imageData.height;
            const ctx = canvas.getContext('2d');
            ctx.putImageData(imageData, 0, 0);

            status.textContent = 'Done.';
            canvas.style.display = 'inline-block';
        } catch (error) {
            status.textContent = `Generation failed: ${error.message}`;
        } finally {
            generateBtn.disabled = false;
        }
    }

    generateBtn.addEventListener('click', generateImage);
    
    // Load model immediately on page load
    loadModel();
</script>

</body>
</html>
