<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Lite | Pro</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/2028114-bit/Picture/refs/heads/main/favicon-32x32.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: { ignoreHtmlClass: 'tex2jax_ignore', processHtmlClass: 'tex2jax_process' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-color: #050505;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
        }

        body { 
            background-color: var(--bg-color); 
            color: #e5e7eb; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* DYNAMIC ORB SYSTEM */
        .voice-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
            transition: all 1s ease;
        }

        .mesh-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity, filter;
        }

        .layer-1 { background: conic-gradient(from 0deg at 50% 50%, var(--accent-blue), #1e40af, #60a5fa, var(--accent-blue)); animation: rotate-layer 10s linear infinite; }
        .layer-2 { width: 80%; height: 80%; background: conic-gradient(from 180deg at 50% 50%, var(--accent-purple), #06b6d4, var(--accent-blue), var(--accent-purple)); animation: rotate-layer 6s linear infinite reverse; opacity: 0.5; }

        @keyframes rotate-layer { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .listening .layer-1 { animation: rotate-layer 15s linear infinite, breathe 4s ease-in-out infinite; }
        .listening .layer-2 { animation: rotate-layer 8s linear infinite reverse, breathe 6s ease-in-out infinite; }

        @keyframes breathe {
            0%, 100% { transform: scale(0.9); opacity: 0.4; filter: blur(45px); }
            50% { transform: scale(1.05); opacity: 0.7; filter: blur(35px); }
        }

        .thinking .mesh-layer { filter: blur(20px); opacity: 0.9; scale: 0.8; }
        .thinking .layer-1 { animation: rotate-layer 1.5s linear infinite; background: white; }
        .thinking .layer-2 { animation: rotate-layer 1s linear infinite reverse; background: var(--accent-blue); }

        .speaking .mesh-layer { animation: speak-vibe 0.4s ease-in-out infinite alternate; filter: blur(30px); opacity: 0.8; }
        @keyframes speak-vibe { from { transform: scale(0.95) translateY(0); } to { transform: scale(1.1) translateY(-5px); } }

        #scroll-box::-webkit-scrollbar { width: 3px; }
        #scroll-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }

        .markdown-content h1, .markdown-content h2 { font-weight: 700; color: white; margin-top: 1rem; }
        .markdown-content code { background: #1a1a1a; padding: 2px 5px; border-radius: 4px; font-size: 0.9em; }
        .markdown-content pre { background: #111; padding: 1rem; border-radius: 12px; margin: 1rem 0; overflow-x: auto; border: 1px solid #222; }
        
        .glass-input {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .action-hud {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 2rem;
            padding-bottom: 2rem;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 14px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #9ca3af;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-blue);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recording { background: #ef4444 !important; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="w-full flex justify-between text-[10px] tracking-[0.3em] text-gray-500 uppercase font-bold mb-6">
        <div class="flex items-center gap-2">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
            Architect Pro 2.0
        </div>
        <div class="flex gap-4 md:gap-6">
            <button onclick="downloadHistory()" class="hover:text-white transition-colors">Export .MD</button>
            <button onclick="clearDisplay()" class="hover:text-white transition-colors">Clear Chat</button>
            <button onclick="newChat()" class="hover:text-white transition-colors">Reset Brain</button>
            <button onclick="resetAll()" class="hover:text-red-500 transition-colors opacity-40 hover:opacity-100">Factory Reset</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center min-h-0 w-full max-w-3xl mx-auto">
        <div id="orb-wrapper" class="voice-container listening">
            <div class="mesh-layer layer-1"></div>
            <div class="mesh-layer layer-2"></div>
        </div>

        <div id="scroll-box" class="w-full flex-1 overflow-y-auto px-4 flex flex-col transition-all">
            <div class="flex-1"></div> 
            <div id="response-text" class="markdown-content text-xl md:text-2xl text-gray-300 text-center leading-relaxed pb-12 tex2jax_process">
                Hello Tommy. How can I help you today?
            </div>
        </div>
    </div>

    <div class="w-full max-w-2xl mx-auto pb-4">
        <form onsubmit="event.preventDefault(); startAI();" class="glass-input relative flex items-center rounded-3xl px-6 py-4 transition-all focus-within:border-white/20">
            <button type="button" id="voice-btn" onclick="toggleDictation()" class="mr-3 text-gray-500 hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            
            <input id="user-input" type="text" 
                class="bg-transparent w-full outline-none text-lg text-white placeholder-gray-600 font-light" 
                placeholder="Ask anything..."
                autocomplete="off">
            
            <button type="submit" class="ml-4 bg-white text-black rounded-full p-2.5 hover:scale-110 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13a1 1 0 102 0V9.414l1.293 1.293a1 1 0 001.414-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </form>
        <p class="text-[9px] text-center text-gray-600 mt-4 tracking-widest uppercase">Llama-3.2-3B Instruct • Encrypted Storage • Created by Tommy</p>
    </div>

    <script>
        let API_KEY = localStorage.getItem('openrouter_key') || "";
        let chatHistory = JSON.parse(localStorage.getItem('chat_history')) || [];

        const personalization = {
            nickname: "Tommy",
            occupation: "Senior Developer",
            bio: "Building high-performance AI interfaces and architectural systems."
        };

        function checkKey() {
            if (!API_KEY) {
                API_KEY = prompt("Enter OpenRouter API Key:");
                if (API_KEY) localStorage.setItem('openrouter_key', API_KEY);
            }
        }

        function clearDisplay() {
            const display = document.getElementById('response-text');
            display.style.opacity = "0";
            setTimeout(() => {
                display.innerText = "Screen cleared.";
                display.style.opacity = "1";
            }, 400);
        }

        function newChat() {
            chatHistory = [];
            localStorage.removeItem('chat_history');
            const display = document.getElementById('response-text');
            display.style.opacity = "0";
            setTimeout(() => {
                display.innerText = "Memory wiped. Ready for something new.";
                display.style.opacity = "1";
            }, 500);
        }

        function resetAll() {
            if(confirm("Factory Reset? All keys and history will be wiped.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function downloadHistory() {
            if (chatHistory.length === 0) return alert("No history to export.");
            const content = chatHistory.map(m => `### ${m.role.toUpperCase()}\n${m.content}\n\n`).join("");
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Architect-Pro-Session-${new Date().toLocaleDateString()}.md`;
            a.click();
        }

        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                document.getElementById('voice-btn').classList.remove('recording');
                startAI();
            };
            recognition.onend = () => document.getElementById('voice-btn').classList.remove('recording');
        }

        function toggleDictation() {
            if (!recognition) return alert("Speech recognition not supported.");
            document.getElementById('voice-btn').classList.add('recording');
            recognition.start();
        }

        async function startAI() {
            checkKey();
            const input = document.getElementById('user-input');
            const display = document.getElementById('response-text');
            const orb = document.getElementById('orb-wrapper');
            const dot = document.getElementById('status-dot');
            const text = input.value.trim();

            if (!text || !API_KEY) return;

            // UPDATED SYSTEM CONTEXT FOR BALANCED RESPONSES
            const sys = `You are a helpful, conversational AI assistant. 

CORE PERSONALITY:
1. BALANCE: Provide clear, direct answers with enough detail to be useful, but avoid long-winded essays.
2. STYLE: Natural and friendly. Use a tone that is professional yet approachable.
3. STRUCTURE: Use short paragraphs or simple bullet points if a task has multiple steps.
4. FORMATTING: Use Markdown for clarity (bolding key terms) but keep it lightweight.

User: ${personalization.nickname || 'Tommy'}`;

            chatHistory.push({ "role": "user", "content": text });
            input.value = "";
            display.style.opacity = "0.4";
            orb.className = "voice-container thinking";
            dot.classList.replace('bg-blue-500', 'bg-yellow-500');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${API_KEY}`, 
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Architect Lite Pro"
                    },
                    body: JSON.stringify({ 
                        "model": "meta-llama/llama-3.2-3b-instruct", 
                        "messages": [
                            { "role": "system", "content": sys },
                            ...chatHistory.slice(-12)
                        ] 
                    })
                });

                const data = await response.json();
                
                if (data?.choices?.[0]) {
                    const aiResponse = data.choices[0].message.content;
                    chatHistory.push({ "role": "assistant", "content": aiResponse });
                    localStorage.setItem('chat_history', JSON.stringify(chatHistory));
                    display.style.opacity = "1";
                    dot.classList.replace('bg-yellow-500', 'bg-green-500');
                    typeText(aiResponse, display);
                } else {
                    throw new Error(data.error?.message || "Check API Key.");
                }
            } catch (err) {
                display.innerHTML = `<span class="text-red-500">Error:</span> ${err.message}`;
                orb.className = "voice-container listening";
                dot.classList.replace('bg-yellow-500', 'bg-red-500');
            }
        }

        function typeText(text, element) {
            let i = 0; 
            element.innerHTML = ""; 
            const box = document.getElementById('scroll-box');
            const orb = document.getElementById('orb-wrapper');
            orb.className = "voice-container speaking";

            function process() {
                if (i < text.length) {
                    const isAtBottom = (box.scrollHeight - box.scrollTop) <= (box.clientHeight + 150);
                    i = Math.min(i + 4, text.length);
                    element.innerHTML = marked.parse(text.substring(0, i));
                    
                    if (isAtBottom) { box.scrollTop = box.scrollHeight; }
                    requestAnimationFrame(process);
                } else { 
                    orb.className = "voice-container listening";
                    document.getElementById('status-dot').classList.replace('bg-green-500', 'bg-blue-500');
                    if (window.MathJax?.typesetPromise) window.MathJax.typesetPromise([element]);

                    const hud = document.createElement('div');
                    hud.className = "action-hud fade-up";
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.className = "action-btn";
                    copyBtn.innerHTML = "Copy";
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(text);
                        copyBtn.innerText = "Copied!";
                        setTimeout(() => { copyBtn.innerText = "Copy"; }, 2000);
                    };

                    const dlBtn = document.createElement('button');
                    dlBtn.className = "action-btn";
                    dlBtn.innerText = "Save";
                    dlBtn.onclick = () => downloadHistory();

                    hud.appendChild(copyBtn);
                    hud.appendChild(dlBtn);
                    element.appendChild(hud);
                    
                    setTimeout(() => { box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' }); }, 100);
                }
            }
            process();
        }

        window.onload = () => {
            const last = chatHistory.filter(m => m.role === 'assistant').pop();
            if (last) document.getElementById('response-text').innerHTML = marked.parse(last.content);
        };
    </script>
</body>
</html>
