<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SuperFast AI</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; margin: 0; }
        #status { font-size: 12px; border-bottom: 1px solid #0f0; padding-bottom: 10px; margin-bottom: 20px; }
        #chat { height: 70vh; overflow-y: auto; white-space: pre-wrap; margin-bottom: 20px; }
        .input-line { display: flex; gap: 10px; }
        input { background: transparent; border: none; color: #0f0; flex-grow: 1; outline: none; font-family: monospace; font-size: 16px; }
        .user { color: #00bcff; }
        .ai { color: #fff; }
    </style>
</head>
<body>

    <div id="status">INITIALIZING FAST_MODE...</div>
    <div id="chat"></div>

    <div class="input-line">
        <span>&gt;</span>
        <input type="text" id="user-input" placeholder="Enter command..." disabled>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // This is the fastest reliable 1B model variant
        const selectedModel = "Llama-3.2-1B-Instruct-q4f16_1-MLC-1k"; 
        let engine;

        const chat = document.getElementById("chat");
        const status = document.getElementById("status");
        const input = document.getElementById("user-input");

        async function init() {
            try {
                engine = await webllm.CreateMLCEngine(selectedModel, {
                    initProgressCallback: (p) => status.textContent = `LOADING: ${Math.round(p.progress * 100)}% - ${p.text}`
                });
                status.textContent = "SYSTEM_READY: LOW_LATENCY_ACTIVE";
                input.disabled = false;
                input.focus();
            } catch (e) {
                status.textContent = "ERROR: GPU_UNAVAILABLE";
            }
        }

        async function send() {
            const val = input.value.trim();
            if(!val) return;
            
            input.value = "";
            chat.innerHTML += `<div class="user">USER: ${val}</div>`;
            const aiDiv = document.createElement("div");
            aiDiv.className = "ai";
            aiDiv.innerHTML = "AI: ";
            chat.appendChild(aiDiv);

            const chunks = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: "Direct answers only. No filler." },
                    { role: "user", content: val }
                ],
                stream: true,
                temperature: 0.0, // No "thinking" time, just the most likely tokens
                max_tokens: 500   // Keep responses short for speed
            });

            let reply = "";
            for await (const chunk of chunks) {
                const content = chunk.choices[0]?.delta?.content || "";
                reply += content;
                aiDiv.innerText = "AI: " + reply;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        input.onkeypress = (e) => { if(e.key === "Enter") send(); };
        init();
    </script>
</body>
</html>
